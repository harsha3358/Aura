name: Backend Test Suite

on:
  workflow_call:

jobs:
  backend-test:
    runs-on: ubuntu-latest
    
    services:
      db:
        image: pgvector/pgvector:pg16
        ports:
          - 5433:5432
        env:
          POSTGRES_USER: aura
          POSTGRES_PASSWORD: password
          POSTGRES_DB: aura_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache Pip Dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('apps/api/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Backend Dependencies
        working-directory: apps/api
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest-cov

      # Run database migrations
      - name: Run Alembic Migrations
        working-directory: apps/api
        run: |
          alembic upgrade head

      # Run tests with coverage and JUnit XML report
      - name: Run Pytest
        working-directory: apps/api
        run: |
          pytest --cov=app --cov-report=xml --cov-report=term --junitxml=pytest-report.xml

      - name: Upload Pytest Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pytest-reports
          path: |
            apps/api/pytest-report.xml
            apps/api/coverage.xml
