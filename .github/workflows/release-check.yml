name: Release and Code Quality Gates

on:
  workflow_call:

jobs:
  quality-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: 'npm'
          cache-dependency-path: 'apps/web/package-lock.json'

      # Caches
      - name: Cache Pip Dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('apps/api/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # Installation
      - name: Install Python Quality Tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff pip-audit

      - name: Install Frontend Dependencies
        working-directory: apps/web
        run: npm ci

      # 1. Repository Hygiene check
      - name: Run Repository Hygiene Check
        run: node scripts/check_hygiene.js

      # 2. README Link/Case validation
      - name: Run README Validation Check
        run: node scripts/verify_readme.js

      # 3. Architecture governance
      - name: Run Architecture Compliance Check
        run: node scripts/check_architecture.js

      # 4. Ruff Check & Format
      - name: Run Ruff Linter
        run: ruff check apps/api

      - name: Run Ruff Formatter Check
        run: ruff format --check apps/api

      # 5. ESLint, Prettier & TypeScript compiler checks
      - name: Run ESLint
        working-directory: apps/web
        run: npm run lint --if-present || npx eslint src

      - name: Run Prettier Formatter Check
        working-directory: apps/web
        run: npx prettier --check "src/**/*.{ts,tsx,css,json}"

      - name: Run TypeScript Type Checker
        working-directory: apps/web
        run: npx tsc --noEmit

      # 6. Security Scans
      - name: Run Python pip-audit
        run: pip-audit -r apps/api/requirements.txt

      - name: Run Frontend npm audit
        working-directory: apps/web
        run: npm audit --audit-level=high
